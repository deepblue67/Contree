<title>Belote Contrée</title>
<style>
/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#2e6b28;font-family:-apple-system,'SF Pro Rounded','SF Pro Display','Helvetica Neue',sans-serif;color:#f0ede6;overscroll-behavior:none;overflow:hidden;}
body{overflow-x:hidden;background-image:repeating-linear-gradient(45deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 8px),repeating-linear-gradient(-45deg,rgba(0,0,0,.03) 0,rgba(0,0,0,.03) 1px,transparent 1px,transparent 8px);}
button,select,input{font-family:inherit;}

/* ═══════════════════════════════════════════
   LAYOUT
═══════════════════════════════════════════ */
#app{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

/* ═══════════════════════════════════════════
   HEADER
═══════════════════════════════════════════ */
.header{background:#1a3318;padding:10px 16px;display:flex;align-items:center;justify-content:center;position:relative;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0;}
.header-title{font-size:16px;font-weight:800;letter-spacing:-.3px;}
.header-sub{font-size:11px;opacity:.6;margin-top:2px;}

/* ═══════════════════════════════════════════
   BOTTOM NAV
═══════════════════════════════════════════ */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1a3318;border-top:1px solid rgba(255,255,255,.08);display:grid;grid-template-columns:repeat(5,1fr);z-index:300;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 4px 7px;cursor:pointer;border:none;background:transparent;color:rgba(255,255,255,.35);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;}
.nav-item.active{color:#7ddd82;}
.nav-icon{font-size:18px;line-height:1;}

/* ═══════════════════════════════════════════
   CONTENT AREA
═══════════════════════════════════════════ */
.content-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;padding-bottom:70px;}

/* ═══════════════════════════════════════════
   BUTTONS
═══════════════════════════════════════════ */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px 20px;border-radius:99px;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:opacity .15s,transform .1s;min-height:44px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;}
.btn:active{transform:scale(.95);opacity:.85;}
.btn-green{background:#3d8b3d;color:#fff;box-shadow:0 3px 12px rgba(58,140,63,.4);}
.btn-outline{background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.3);color:#f0ede6;}
.btn-outline-dark{background:#fff;border:1.5px solid #ccc8be;color:#1a1a1a;}
.btn-gold{background:#c8960a;color:#fff;}
.btn-full{width:100%;}
.btn-row{display:flex;gap:10px;}
.btn-row .btn{flex:1;}

/* ═══════════════════════════════════════════
   CARDS
═══════════════════════════════════════════ */
.card{background:#f0ede6;border-radius:16px;padding:16px 18px;color:#1a1a1a;}
.card-title{font-size:11px;font-weight:700;color:#5a5650;text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px;}
.card-dark{background:rgba(0,0,0,.25);border-radius:16px;padding:14px 16px;border:1px solid rgba(255,255,255,.1);}
.card-dark-title{font-size:12px;font-weight:700;color:rgba(255,255,255,.6);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px;}

/* ═══════════════════════════════════════════
   STEPPER
═══════════════════════════════════════════ */
.stepper{display:flex;align-items:center;border-radius:99px;overflow:hidden;background:rgba(0,0,0,.08);border:1.5px solid #ccc8be;touch-action:manipulation;}
.stepper button{background:rgba(0,0,0,.1);border:none;width:44px;height:46px;font-size:24px;cursor:pointer;color:#1a1a1a;flex-shrink:0;touch-action:manipulation;}
.stepper button:active{background:rgba(0,0,0,.2);}
.stepper .sv{flex:1;min-width:0;text-align:center;font-size:20px;font-weight:800;border:none;background:transparent;color:#1a1a1a;font-family:inherit;outline:none;}

/* ═══════════════════════════════════════════
   SUIT BUTTONS
═══════════════════════════════════════════ */
.suit-btn{padding:12px 4px;border-radius:99px;font-size:36px;line-height:1;cursor:pointer;border:2px solid transparent;background:#fff;text-align:center;transition:all .15s;box-shadow:0 2px 8px rgba(0,0,0,.15);min-height:44px;}
.suit-btn:active{transform:scale(.94);}
.suit-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}

/* ═══════════════════════════════════════════
   CHIPS
═══════════════════════════════════════════ */
.chip{padding:9px 14px;border-radius:99px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid rgba(0,0,0,.2);background:rgba(0,0,0,.06);color:#1a1a1a;transition:all .15s;min-height:44px;display:inline-flex;align-items:center;}
.chip-row{display:flex;gap:8px;flex-wrap:wrap;}

/* ═══════════════════════════════════════════
   SCORE BOX
═══════════════════════════════════════════ */
.score-box{background:rgba(255,255,255,.1);border-radius:12px;padding:14px 10px;text-align:center;border:2px solid transparent;transition:all .3s;}
.score-box.leading{border-color:#3a8c3f;background:rgba(58,140,63,.25);}
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ═══════════════════════════════════════════
   QUICK VALUES
═══════════════════════════════════════════ */
.qv{cursor:pointer;font-size:12px;padding:4px 8px;border-radius:99px;border:1px solid #bbb8b0;background:#e8e4dc;color:#1a1a1a;font-weight:600;touch-action:manipulation;white-space:nowrap;min-height:44px;display:inline-flex;align-items:center;}
.qv-cap{border-color:#1a5295;background:#e8f0fb;color:#1a5295;font-weight:700;}
.qv-cap.active{background:#1a5295;color:#fff;}
.qv.active{background:#3a8c3f;color:#fff;border-color:#3a8c3f;}

/* ═══════════════════════════════════════════
   HISTORY
═══════════════════════════════════════════ */
.hi{padding:10px 0;border-bottom:1px solid #e0ddd6;}
.hi:last-child{border-bottom:none;}
.hi-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.hi-num{font-size:11px;font-weight:700;color:#8a8680;width:20px;}
.hi-contract{font-size:14px;font-weight:700;flex:1;color:#1a1a1a;}
.tag-fait{background:#d4edcf;color:#1a5c1e;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
.tag-chute{background:#fce8e8;color:#cc1f1f;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;}
.tag-gold{background:#f0c040;color:#5a3a00;font-size:10px;font-weight:700;padding:1px 6px;border-radius:99px;margin-left:4px;}
.hi-bottom{display:flex;gap:8px;font-size:11px;color:#5a5650;margin-left:28px;flex-wrap:wrap;}

/* ═══════════════════════════════════════════
   MODALS / TOAST
═══════════════════════════════════════════ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:flex-end;justify-content:center;padding:16px;}
.modal-box{background:#1a2e1a;border-radius:18px;padding:22px;width:100%;max-width:420px;border:1px solid rgba(255,255,255,.15);}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);color:#fff;padding:10px 20px;border-radius:99px;font-size:14px;font-weight:600;z-index:9999;white-space:nowrap;pointer-events:none;}

/* ═══════════════════════════════════════════
   SETUP SCREEN
═══════════════════════════════════════════ */
#screen-setup{display:flex;flex-direction:column;min-height:100vh;}
#setup-body{display:flex;flex-direction:column;gap:12px;padding:12px;overflow-y:auto;flex:1;padding-bottom:80px;}
#setup-table-wrap{position:relative;width:100%;max-width:480px;margin:0 auto;}

/* ═══════════════════════════════════════════
   GAME SCREEN
═══════════════════════════════════════════ */
#screen-game{display:flex;flex-direction:column;min-height:100vh;}

/* ═══════════════════════════════════════════
   ENJEU TAB
═══════════════════════════════════════════ */
#enjeu-inner{display:flex;flex-direction:column;gap:10px;padding:8px 10px;}
#ej-table-wrap{width:100%;}
#ej-table-wrap svg{width:100%;height:auto;display:block;border-radius:16px;max-height:44vw;}

/* ═══════════════════════════════════════════
   WINNER SCREEN
═══════════════════════════════════════════ */
#screen-winner{min-height:100vh;background:radial-gradient(ellipse at top,#1e6b22 0%,#0d3a10 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;color:#fff;gap:16px;}
@keyframes bounce{from{transform:translateY(0);}to{transform:translateY(-10px);}}
.winner-trophy{animation:bounce 1s ease infinite alternate;}

/* ═══════════════════════════════════════════
   SPLASH
═══════════════════════════════════════════ */
#splash{position:fixed;inset:0;z-index:99999;background:#2e6b28;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s ease;}
#splash.hide{opacity:0;pointer-events:none;}
#splash-card{width:90px;height:126px;background:#faf6ee;border-radius:12px;border:2px solid #c8a84a;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;box-shadow:0 8px 32px rgba(0,0,0,.4);}
@keyframes splashIn{from{transform:scale(.7) rotate(-8deg);opacity:0;}to{transform:scale(1) rotate(0);opacity:1;}}
#splash-card{animation:splashIn .6s ease-out;}
#splash-title{font-size:22px;font-weight:900;color:#fff;letter-spacing:-.5px;animation:splashIn .6s ease-out .15s both;}
#splash-sub{font-size:13px;color:rgba(255,255,255,.6);animation:splashIn .6s ease-out .25s both;}

/* ═══════════════════════════════════════════
   IPHONE PORTRAIT (default ≤599px portrait)
   — styles de base déjà définis ci-dessus —
═══════════════════════════════════════════ */

/* ═══════════════════════════════════════════
   IPHONE PAYSAGE (≤899px landscape)
═══════════════════════════════════════════ */
@media (max-width:899px) and (orientation:landscape){
  #app{max-width:100%;width:100%;}

  /* Header compact */
  .header{padding:5px 14px;}
  .header-title{font-size:13px;}
  .header-sub{font-size:9px;}

  /* Nav compacte */
  .bottom-nav .nav-item{padding:3px 2px;font-size:7px;height:46px;}
  .nav-icon{font-size:14px;}

  /* Enjeu : table à gauche, sidebar à droite */
  #enjeu-inner{
    display:grid !important;
    grid-template-columns:1fr 230px;
    grid-template-rows:auto auto auto auto;
    column-gap:10px;row-gap:7px;
    padding:6px 10px;
    align-items:start;
  }
  #ej-table-wrap{grid-column:1;grid-row:1/5;padding:0 !important;}
  #ej-table-wrap svg{max-height:calc(100vh - 90px) !important;}
  #ej-dealer{grid-column:2;grid-row:1;margin:0;font-size:11px;padding:7px 10px;}
  #ej-contract{grid-column:2;grid-row:2;margin:0;}
  #ej-contract-suit{font-size:22px !important;}
  #ej-contract-val{font-size:14px !important;}
  #ej-contract-team{font-size:11px !important;}
  #ej-scores{grid-column:2;grid-row:3;margin:0;}
  .score-grid{grid-template-columns:1fr !important;gap:5px !important;}
  .score-box{padding:7px 10px !important;display:flex;align-items:center;justify-content:space-between;text-align:left;}
  .score-name{font-size:10px !important;margin-bottom:0 !important;}
  .score-val{font-size:28px !important;}
  .score-need{display:none !important;}
  #ej-btns{grid-column:2;grid-row:4;}
  #ej-btns .btn-row .btn{font-size:11px;padding:8px 4px;}

  /* Autres onglets : overlay plein écran */
  .tab-overlay{
    position:fixed !important;
    top:40px !important;left:0 !important;right:0 !important;bottom:46px !important;
    z-index:200 !important;
    overflow-y:auto !important;
    -webkit-overflow-scrolling:touch !important;
    overscroll-behavior:contain !important;
    padding:8px 12px !important;
    background:#2e6b28 !important;
    -webkit-transform:translateZ(0);transform:translateZ(0);
    will-change:transform;
  }

  /* Contrat : 2 colonnes en paysage */
  #contrat-card{
    display:grid !important;
    grid-template-columns:1fr 1fr !important;
    gap:8px 18px !important;
    padding:10px 14px !important;
  }
  .contrat-card-title{display:none !important;}
  #contrat-preneur{grid-column:1;grid-row:1;}
  #contrat-contre{grid-column:1;grid-row:2;}
  #contrat-hauteur{grid-column:2;grid-row:1;}
  #contrat-couleur{grid-column:2;grid-row:2;}
  .suit-btn{font-size:22px !important;padding:6px 4px !important;}
  .suit-grid{gap:4px !important;}
  .chip{font-size:11px !important;padding:7px 8px !important;}
  #contrat-btns{flex-direction:row !important;}
  #contrat-btns .btn{font-size:12px;padding:10px 6px;}

  /* Setup : table gauche, droite contrôles */
  #setup-body{
    display:grid !important;
    grid-template-columns:1fr 200px !important;
    grid-template-rows:auto auto;
    gap:10px !important;
    padding:6px 10px !important;
    padding-bottom:6px !important;
  }
  #setup-table-wrap{grid-column:1;grid-row:1/3;max-width:100% !important;}
  #setup-table-wrap svg{width:100% !important;height:calc(100vh - 90px) !important;max-height:none !important;}
  #setup-donneur{grid-column:2;grid-row:1;}
  #setup-start{grid-column:2;grid-row:2;}

  .card{padding:10px 12px;border-radius:10px;}
  .card-title{font-size:10px;margin-bottom:8px;}
}

/* ═══════════════════════════════════════════
   IPAD PORTRAIT (≥700px portrait)
═══════════════════════════════════════════ */
@media (min-width:700px) and (orientation:portrait){
  #app{max-width:100%;width:100%;}
  .header-title{font-size:22px;}
  .header-sub{font-size:13px;}
  #ej-table-wrap svg{max-height:52vh !important;}
  .card{padding:22px 28px;border-radius:22px;}
  .card-title{font-size:14px;}
  .btn{font-size:17px;padding:17px 28px;}
  .score-val{font-size:72px !important;}
  .score-name{font-size:13px !important;}
  .suit-btn{font-size:56px;padding:18px 10px;}
  .stepper button{width:60px;height:60px;font-size:28px;}
  .stepper .sv{font-size:26px;}
  .chip{font-size:15px;padding:12px 18px;}
  .nav-item{padding:14px 8px 12px;font-size:11px;}
  .nav-icon{font-size:24px;}
  #enjeu-inner{padding:12px 16px;gap:14px;}
  #setup-body{padding:16px;gap:16px;}
  .hi-contract{font-size:16px;}
  .hi-bottom{font-size:13px;}
}

/* ═══════════════════════════════════════════
   IPAD PAYSAGE (≥900px landscape)
═══════════════════════════════════════════ */
@media (min-width:900px) and (orientation:landscape){
  #app{max-width:100%;width:100%;}
  .header-title{font-size:22px;}
  .header-sub{font-size:12px;}

  /* Enjeu : grande table gauche, sidebar 340px */
  #enjeu-inner{
    display:grid !important;
    grid-template-columns:1fr 340px;
    grid-template-rows:auto auto auto auto;
    column-gap:20px;row-gap:14px;
    padding:14px 20px;
    align-items:start;
    min-height:calc(100vh - 110px);
  }
  #ej-table-wrap{grid-column:1;grid-row:1/5;}
  #ej-table-wrap svg{max-height:calc(100vh - 120px) !important;width:100% !important;}
  #ej-dealer{grid-column:2;grid-row:1;font-size:13px;padding:12px 16px;}
  #ej-contract{grid-column:2;grid-row:2;}
  #ej-scores{grid-column:2;grid-row:3;}
  .score-grid{grid-template-columns:1fr !important;gap:10px !important;}
  .score-box{padding:14px 16px !important;display:flex;align-items:center;justify-content:space-between;text-align:left;}
  .score-name{margin-bottom:0 !important;font-size:12px !important;}
  .score-val{font-size:52px !important;}
  .score-need{display:none !important;}
  #ej-btns{grid-column:2;grid-row:4;}
  #ej-btns .btn-row .btn{font-size:15px;padding:14px 8px;}

  /* Autres onglets : overlay plein écran */
  .tab-overlay{
    position:fixed !important;
    top:56px !important;left:0 !important;right:0 !important;bottom:62px !important;
    z-index:200 !important;
    overflow-y:auto !important;
    -webkit-overflow-scrolling:touch !important;
    padding:14px 20px !important;
    background:#2e6b28 !important;
    -webkit-transform:translateZ(0);transform:translateZ(0);
    will-change:transform;
  }

  /* Setup : 2 colonnes */
  #setup-body{
    display:grid !important;
    grid-template-columns:1fr 380px !important;
    grid-template-rows:auto auto;
    gap:20px !important;
    padding:20px 32px !important;
    align-items:start;
  }
  #setup-table-wrap{grid-column:1;grid-row:1/3;max-width:100% !important;}
  #setup-donneur{grid-column:2;grid-row:1;}
  #setup-start{grid-column:2;grid-row:2;}

  .card{padding:24px 32px;border-radius:24px;}
  .card-title{font-size:14px;}
  .btn{font-size:17px;padding:17px 30px;}
  .suit-btn{font-size:60px;padding:20px 10px;}
  .stepper button{width:64px;height:64px;font-size:30px;}
  .stepper .sv{font-size:28px;}
  .chip{font-size:16px;padding:12px 20px;}
  .nav-item{padding:16px 12px 13px;font-size:11px;}
  .nav-icon{font-size:26px;}
  .hi-contract{font-size:16px;}
  .hi-bottom{font-size:13px;}
}
</style>

<body>

<!-- SPLASH -->
<div id="splash">
  <div id="splash-card">
    <div style="font-size:44px;line-height:1;">♠</div>
    <div style="font-size:11px;font-weight:700;color:#5a3a0a;letter-spacing:.05em;">BELOTE</div>
  </div>
  <div id="splash-title">Belote Contrée</div>
  <div id="splash-sub">Chargement…</div>
</div>

<div id="app">
  <div id="screen-setup"></div>
  <div id="screen-game" style="display:none;"></div>
  <div id="screen-winner" style="display:none;"></div>
</div>
<div id="toast-el" class="toast" style="display:none;"></div>

<script>
/* ═══════════════════════════════════════════
   CONSTANTES
═══════════════════════════════════════════ */
const DEFAULT_PLAYERS=['Christophe','Mika','Rakhel','Daniel','Florent','Isa','Seb','Julian','Matth','Estelle','Eric','Olive','Pepsy','Wiskas','Laurent','Gael','Loic','Eugénie','Valérie','MikaPSG','Claire','Cynthia','Balou','Olivia','Elodie','Nico','Mimi','Marc','Le Corse'];
const DEALER_ORDER=['nord','ouest','sud','est'];
const SUITS=[{sym:'♥',key:'h',red:true},{sym:'♦',key:'d',red:true},{sym:'♣',key:'c',red:false},{sym:'♠',key:'s',red:false}];
const CONTRACT_VALS=[80,90,100,110,120,130,140,150,160,170];

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function ls(k,d){try{const v=localStorage.getItem(k);return v?JSON.parse(v):d;}catch(e){return d;}}
function lss(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function cap(s){return s.charAt(0).toUpperCase()+s.slice(1);}

/* ═══════════════════════════════════════════
   STATE
═══════════════════════════════════════════ */
let S={
  screen:'setup',
  tab:'enjeu',
  players:ls('belote_players',DEFAULT_PLAYERS),
  pos:{nord:'',sud:'',est:'',ouest:''},
  firstDealer:'random',
  t1:null,t2:null,

/* ═══════════════════════════════════════════
   CALCUL DU SCORE
═══════════════════════════════════════════ */
function calcScore(pts1Raw,pts2Raw,bel1,bel2,cap1,cap2,contract){
  if(!contract)return null;
  const{value,isCapot,preneurTeam,contre}=contract;
  const bp1=bel1?20:0, bp2=bel2?20:0;
  const mult=contre==='contre'?2:contre==='surcontre'?3:1;
  const pen=160;
  let out1=0,out2=0,chute=false,detail='';

  if(isCapot){
    const capByP=(preneurTeam==='t1'&&cap1)||(preneurTeam==='t2'&&cap2);
    const pBel=preneurTeam==='t1'?bp1:bp2, aBel=preneurTeam==='t1'?bp2:bp1;
    if(capByP){
      const b=250*mult;
      if(preneurTeam==='t1'){out1=b+pBel;out2=aBel;}else{out2=b+pBel;out1=aBel;}
      chute=false;detail=`Capot fait: ${b}+bel ${pBel}=${b+pBel}`;
    } else {
      chute=true;
      const b=250*mult+pen;
      if(preneurTeam==='t1'){out1=pBel;out2=b+aBel;}else{out2=pBel;out1=b+aBel;}
      detail=`Capot chute: (250×${mult})+${pen}=${b} pour adversaires`;
    }
  } else {
    const ann=value;
    const pPts=preneurTeam==='t1'?pts1Raw:pts2Raw, aPts=preneurTeam==='t1'?pts2Raw:pts1Raw;
    const pBel=preneurTeam==='t1'?bp1:bp2, aBel=preneurTeam==='t1'?bp2:bp1;
    if(pPts+pBel>=ann){
      chute=false;
      const s=ann*mult+pPts+pBel, a=aPts+aBel;
      if(preneurTeam==='t1'){out1=s;out2=a;}else{out2=s;out1=a;}
      detail=`${ann}×${mult}=${ann*mult}+plis ${pPts}+bel ${pBel}=${s} | Adv: ${a}`;
    } else {
      chute=true;
      const a=ann*mult+pen+aBel, p=pBel;
      if(preneurTeam==='t1'){out1=p;out2=a;}else{out2=p;out1=a;}
      detail=`Chute: (${ann}×${mult})+${pen}+bel ${aBel}=${a} | Preneur bel: ${p}`;
    }
  }
  return{pts1:out1,pts2:out2,chute,detail};
}

function startGame(){
  const{nord,sud,est,ouest}=S.pos;
  if(!nord||!sud||!est||!ouest){showToast('⚠️ Choisissez un joueur à chaque position');return;}
  if(new Set([nord,sud,est,ouest]).size<4){showToast('⚠️ Joueurs différents à chaque position');return;}
  S.t1={name:nord+' & '+sud,players:[nord,sud]};
  S.t2={name:est+' & '+ouest,players:[est,ouest]};
  S.score={t1:0,t2:0};S.history=[];S.manche=1;S.contract=null;S.calcResult=null;
  S.saisie={pts1:'',pts2:'',bel1:false,bel2:false,cap1:false,cap2:false};
  let didx=0;
  if(S.firstDealer==='random') didx=Math.floor(Math.random()*4);
  else{const p=Object.keys(S.pos).find(k=>S.pos[k]===S.firstDealer)||'nord';didx=DEALER_ORDER.indexOf(p);}
  S.dealerIdx=didx;S.screen='game';S.tab='enjeu';
  autoSave();render();
}

function resumeGame(){
  const snap=S.autoSaveModal;
  Object.assign(S,{pos:snap.pos,t1:snap.t1,t2:snap.t2,score:snap.score,history:snap.history,manche:snap.manche,dealerIdx:snap.dealerIdx,contract:snap.contract||null,autoSaveModal:null,screen:'game',tab:'enjeu'});
  render();
}

function newGameReset(){
  if(S.history.length)savePastGame(S.score,S.history);
  S.score={t1:0,t2:0};S.history=[];S.manche=1;S.contract=null;S.calcResult=null;S.winner=null;
  S.saisie={pts1:'',pts2:'',bel1:false,bel2:false,cap1:false,cap2:false};
  lss('belote_autosave',null);S.screen='setup';render();
}

function confirmContract(){
  const f=S.form;
  if(!f.preneur){showToast('Choisissez l\'équipe preneuse');return;}
  if(!f.suit){showToast('Choisissez la couleur atout');return;}
  const val=f.isCapot?250:f.value;
  S.contract={preneurTeam:f.preneur,suit:f.suit,suitKey:f.suitKey,value:val,isCapot:(val===250),contre:f.contre,manche:S.manche,dealer:S.pos[dealerPos()]};
  S.tab='enjeu';autoSave();renderGame();
}

   ACTIONS SCORE
═══════════════════════════════════════════ */
function calcAndPreview(){
  const{pts1,pts2,bel1,bel2,cap1,cap2}=S.saisie;
  S.calcResult=calcScore(parseInt(pts1)||0,parseInt(pts2)||0,bel1,bel2,cap1,cap2,S.contract);
  renderSaisie();
}

function validateScore(){
  if(!S.calcResult)return;
  const ns={t1:S.score.t1+S.calcResult.pts1,t2:S.score.t2+S.calcResult.pts2};
  S.history.push({
    manche:S.manche,
    contract:S.contract?`${S.contract.isCapot?'Capot':S.contract.value} ${S.contract.suit}`:'—',
    contre:S.contract?S.contract.contre:'none',
    preneur:S.contract?(S.contract.preneurTeam==='t1'?S.t1.name:S.t2.name):'—',
    chute:S.calcResult.chute,
    pts1:S.calcResult.pts1,pts2:S.calcResult.pts2,
    total1:ns.t1,total2:ns.t2
  });
  const summary={result:{...S.calcResult},newScore:{...ns}};
  S.score=ns;S.manche++;
  S.dealerIdx=(S.dealerIdx+1)%4;
  S.contract=null;S.calcResult=null;
  S.saisie={pts1:'',pts2:'',bel1:false,bel2:false,cap1:false,cap2:false};

  if(ns.t1>=2001||ns.t2>=2001){
    const w=ns.t1>ns.t2?S.t1:S.t2;
    savePastGame(ns,S.history);
    S.winner={team:w,score:{...ns}};S.screen='winner';
    lss('belote_autosave',null);render();return;
  }
  autoSave();S.mancheSummary=summary;S.tab='enjeu';renderGame();
}

function savePastGame(sc,hist){
  const now=new Date();
  const ds=now.toLocaleDateString('fr-FR',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'});
  const ts=now.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  S.pastGames=[{id:Date.now(),date:ds,time:ts,t1:S.t1.name,t2:S.t2.name,score1:sc.t1,score2:sc.t2,winner:sc.t1>=sc.t2?S.t1.name:S.t2.name,manches:hist.length},...S.pastGames].slice(0,50);
  lss('belote_history',S.pastGames);
}

function makeSVG(players,dPos,fPos,contract,t1,t2){

    const n=players[p.id]||'';if(!n)return'';
    const isD=dPos===p.id, isF=fPos===p.id;
    const bw=118,bh=32,bx=p.x-59,by=p.y-16;
    const fill=(p.id==='nord'||p.id==='sud')?'#1a4a1a':'#0e1e3e';
    const stroke=(p.id==='nord'||p.id==='sud')?'#3a8c3f':'#1a5295';
    const dn=isD?`<text x="${bx+bw-4}" y="${by+13}" text-anchor="end" font-size="13" fill="#f0c040">🃏</text>`:'';
    const fn=isF?`<circle cx="${bx+8}" cy="${by+9}" r="5" fill="#7ddd82"/>`:'';

  const teams=t1&&t2
    ?`<text x="200" y="240" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.35)">${t1.name}</text>
      <text x="200" y="252" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.22)">vs</text>
      <text x="200" y="264" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.35)">${t2.name}</text>`:'';

  return `<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <pattern id="qp" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse">
        <rect width="10" height="10" fill="#2a6b26"/>
        <path d="M5,0L10,5L5,10L0,5Z" fill="none" stroke="rgba(0,0,0,0.12)" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="400" height="400" rx="18" fill="url(#qp)"/>
    <rect x="8" y="8" width="384" height="384" rx="14" fill="none" stroke="#c8a84a" stroke-width="3"/>
    <rect x="14" y="14" width="372" height="372" rx="11" fill="none" stroke="rgba(200,168,74,0.35)" stroke-width="1"/>
    <rect x="22" y="22" width="48" height="48" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(200,168,74,0.4)" stroke-width="1"/>
    <text x="46" y="56" text-anchor="middle" font-family="serif" font-size="30" fill="#111">♠</text>
    <rect x="330" y="22" width="48" height="48" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(200,168,74,0.4)" stroke-width="1"/>
    <text x="354" y="56" text-anchor="middle" font-family="serif" font-size="30" fill="#c8000a">♦</text>
    <rect x="22" y="330" width="48" height="48" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(200,168,74,0.4)" stroke-width="1"/>
    <text x="46" y="364" text-anchor="middle" font-family="serif" font-size="30" fill="#c8000a">♥</text>
    <rect x="330" y="330" width="48" height="48" rx="8" fill="rgba(0,0,0,0.25)" stroke="rgba(200,168,74,0.4)" stroke-width="1"/>
    <text x="354" y="364" text-anchor="middle" font-family="serif" font-size="30" fill="#111">♣</text>

/* ═══════════════════════════════════════════
   HELPERS SAISIE SCORE (globaux, pas de template literals imbriqués)
═══════════════════════════════════════════ */
function saisieStep(pk, op, delta){
  var v = Math.min(500, Math.max(0, (parseInt(S.saisie[pk])||0) + delta));
  S.saisie[pk] = v;
  if(v >= 0 && v <= 160) S.saisie[op] = Math.max(0, 160 - v);
  S.calcResult = null;
  renderSaisie();
}
function saisieInput(pk, op, raw){
  var v = parseInt(raw)||0;
  S.saisie[pk] = v;
  if(v >= 0 && v <= 160) S.saisie[op] = Math.max(0, 160 - v);
  S.calcResult = null;
}
function saisieQV(pk, op, v){
  S.saisie[pk] = v;
  S.saisie[op] = Math.max(0, 160 - v);
  S.calcResult = null;
  renderSaisie();
}
function saisieCapot(ck, ock, pk, op){
  var was = S.saisie[ck];
  S.saisie.cap1 = false; S.saisie.cap2 = false;
  if(!was){
    S.saisie[ck] = true;
    S.saisie[pk] = 250;
    S.saisie[op] = '';
  } else {
    S.saisie[pk] = '';
    S.saisie[op] = '';
  }
  S.calcResult = null;
  renderSaisie();
}
function saisieBelote(bk, ob, checked){
  S.saisie[bk] = checked;
  if(checked) S.saisie[ob] = false;
  S.calcResult = null;
  renderSaisie();
}

function renderSaisieHTML(){
  var c = S.contract;

  // --- Reminder contrat ---
  var reminder;
  if(c){
    var contreTag = (c.contre && c.contre !== 'none')
      ? '<span style="background:#c8960a;color:#fff;font-size:11px;padding:2px 7px;border-radius:99px;margin-left:5px;">'+c.contre+'</span>'

      + '<span style="font-size:42px;color:'+suitColor+';line-height:1;flex-shrink:0;">'+c.suit+'</span>'

  } else {
    reminder = '<div style="background:rgba(255,68,68,.2);border:2px solid rgba(255,68,68,.6);border-radius:12px;padding:12px 16px;font-size:13px;font-weight:700;color:#ff6666;">⚠️ Aucun contrat saisi pour cette manche</div>';
  }

  // --- Colonnes équipes ---
  function buildCol(key){
    var tm  = S[key];
    var isT1 = (key === 't1');
    var ck  = isT1 ? 'cap1' : 'cap2';
    var ock = isT1 ? 'cap2' : 'cap1';
    var bk  = isT1 ? 'bel1' : 'bel2';
    var ob  = isT1 ? 'bel2' : 'bel1';
    var pk  = isT1 ? 'pts1' : 'pts2';
    var op  = isT1 ? 'pts2' : 'pts1';
    var capA = S.saisie[ck];
    var belA = S.saisie[bk];

    var qvBtns = [80,100,120,140].map(function(v){
      return '<span class="qv" onclick="saisieQV(\''+pk+'\',\''+op+'\','+v+');">'+v+'</span>';
    }).join('');
    var capBtn = '<span class="qv qv-cap'+(capA?' active':'')+'" onclick="saisieCapot(\''+ck+'\',\''+ock+'\',\''+pk+'\',\''+op+'\');">K</span>';

    var belBg    = belA ? 'rgba(58,140,63,.2)' : 'rgba(0,0,0,.04)';
    var belBord  = belA ? '#3a8c3f'            : 'rgba(0,0,0,.2)';
    var belColor = belA ? '#2a6b26'            : '#5a5650';

    return '<div style="display:flex;flex-direction:column;gap:7px;min-width:0;">'
      +'<label style="text-align:center;font-size:10px;font-weight:700;color:#5a5650;text-transform:uppercase;letter-spacing:.07em;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">'+tm.name+'</label>'
      +'<div class="stepper" style="opacity:'+(capA?'.5':'1')+';pointer-events:'+(capA?'none':'auto')+';">'
        +'<button onclick="saisieStep(\''+pk+'\',\''+op+'\',-10);">−</button>'
        +'<input type="number" class="sv" value="'+(S.saisie[pk]||'')+'" oninput="saisieInput(\''+pk+'\',\''+op+'\',this.value);" inputmode="numeric" min="0" max="500" style="padding:0 4px;"/>'
        +'<button onclick="saisieStep(\''+pk+'\',\''+op+'\',10);">+</button>'
      +'</div>'
      +'<div style="display:flex;gap:3px;justify-content:center;flex-wrap:nowrap;">'+qvBtns+capBtn+'</div>'
      +'<label style="display:flex;align-items:center;justify-content:center;gap:6px;background:'+belBg+';border:1.5px solid '+belBord+';border-radius:99px;padding:7px;cursor:pointer;font-size:12px;font-weight:600;color:'+belColor+';">'
        +'<input type="checkbox"'+(belA?' checked':'')+' onchange="saisieBelote(\''+bk+'\',\''+ob+'\',this.checked);" style="width:16px;height:16px;cursor:pointer;accent-color:#3a8c3f;flex-shrink:0;"/><span>Belote</span>'
      +'</label>'
    +'</div>';
  }
  var teamCols = buildCol('t1') + buildCol('t2');

  // --- Résultat calcul ---
  var cr = S.calcResult;
  var crHtml = '';
  if(cr){
    var badge = cr.chute
      ? '<span style="background:#cc1f1f;color:#fff;font-size:12px;font-weight:800;padding:3px 12px;border-radius:99px;">⛔ CHUTE</span>'
      : '<span style="background:#2a8c2a;color:#fff;font-size:12px;font-weight:800;padding:3px 12px;border-radius:99px;">✅ FAIT</span>';
    var c1 = cr.chute ? '#ff8080' : '#7ddd82';
    var c2 = cr.chute ? '#ff8080' : '#7ddd82';
    crHtml = '<div style="background:#1a3a1a;border:1px solid rgba(125,221,130,.4);border-radius:12px;padding:14px 16px;margin-top:12px;">'
      +'<div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:10px;">'
        +'<div style="text-align:center;"><div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">'+S.t1.name+'</div><div style="font-size:28px;font-weight:900;color:'+c1+';line-height:1;">'+cr.pts1+'</div></div>'
        +'<div style="font-size:13px;color:rgba(255,255,255,.25);text-align:center;font-weight:700;">vs</div>'
        +'<div style="text-align:center;"><div style="font-size:10px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px;">'+S.t2.name+'</div><div style="font-size:28px;font-weight:900;color:'+c2+';line-height:1;">'+cr.pts2+'</div></div>'
      +'</div>'
      +'<div style="text-align:center;margin-bottom:8px;">'+badge+'</div>'
      +'<div style="font-size:11px;color:rgba(255,255,255,.4);line-height:1.6;">'+cr.detail+'</div>'
    +'</div>';
  }

  var calcBtn = !cr
    ? '<button class="btn btn-gold btn-full" onclick="calcAndPreview();" style="font-size:15px;padding:14px;">🧮 Calculer les points</button>'
    : '';
  var valBtn = cr
    ? '<button class="btn btn-green btn-full" onclick="validateScore();" style="font-size:15px;padding:14px;">✅ Valider — Manche suivante</button>'
    : '';

  return '<div style="display:flex;flex-direction:column;gap:12px;padding:10px 12px;">'
    + reminder
    + '<div class="card">'
      + '<div class="card-title">Résultat de la manche</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">'+teamCols+'</div>'
      + crHtml
    + '</div>'
    + '<div style="display:flex;flex-direction:column;gap:8px;">'
      + calcBtn + valBtn
      + '<button class="btn btn-outline btn-full" onclick="S.calcResult=null;S.tab=\'enjeu\';renderGame();">← Retour</button>'
    + '</div>'
  + '</div>';
}

    </tr>`:'';
  return `<div style="padding:10px 12px;">
    <div class="card">
      <div class="card-title">Feuille de marque</div>
      <table style="width:100%;border-collapse:collapse;font-size:12px;">
        <thead><tr>
          <th style="font-size:10px;font-weight:700;color:#5a5650;text-transform:uppercase;letter-spacing:.05em;padding:6px 4px;border-bottom:2px solid #ccc8be;text-align:left;">Manche</th>
          <th style="font-size:10px;font-weight:700;color:#5a5650;text-transform:uppercase;letter-spacing:.05em;padding:6px 4px;border-bottom:2px solid #ccc8be;text-align:center;">${S.t1.name}</th>
          <th style="font-size:10px;font-weight:700;color:#5a5650;text-transform:uppercase;letter-spacing:.05em;padding:6px 4px;border-bottom:2px solid #ccc8be;text-align:center;">${S.t2.name}</th>
        </tr></thead>
        <tbody>
          ${rows||'<tr><td colspan="3" style="text-align:center;padding:20px;color:#8a8680;font-size:13px;">Aucune manche jouée</td></tr>'}
          ${tot}
        </tbody>
      </table>
      <div style="margin-top:12px;font-size:11px;color:#8a8680;text-align:center;">Partie en 2001 points · Dernière manche comptée au point juste</div>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   MANCHE SUMMARY MODAL
═══════════════════════════════════════════ */
function renderMancheSummaryHTML(){
  const{result:r,newScore:ns}=S.mancheSummary;
  return `<div style="position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:998;display:flex;align-items:center;justify-content:center;padding:16px;">

      <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:8px;margin-bottom:12px;">
        <div style="text-align:center;"><div style="font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">${S.t1.name}</div><div style="font-size:36px;font-weight:900;color:${r.pts1>0?'#7ddd82':'rgba(255,255,255,.4)'};line-height:1;">${r.pts1}</div></div>
        <div style="font-size:15px;color:rgba(255,255,255,.25);font-weight:700;text-align:center;">vs</div>
        <div style="text-align:center;"><div style="font-size:11px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px;">${S.t2.name}</div><div style="font-size:36px;font-weight:900;color:${r.pts2>0?'#7ddd82':'rgba(255,255,255,.4)'};line-height:1;">${r.pts2}</div></div>
      </div>
      <div style="background:rgba(0,0,0,.25);border-radius:10px;padding:10px 14px;display:grid;grid-template-columns:1fr auto 1fr;gap:6px;margin-bottom:14px;align-items:center;">
        <div style="text-align:center;"><div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:2px;">Total</div><div style="font-size:22px;font-weight:900;color:${ns.t1>=2001?'#f0c040':'#fff'};">${ns.t1}</div></div>
        <div style="font-size:11px;color:rgba(255,255,255,.25);text-align:center;">/2001</div>
        <div style="text-align:center;"><div style="font-size:11px;color:rgba(255,255,255,.4);margin-bottom:2px;">Total</div><div style="font-size:22px;font-weight:900;color:${ns.t2>=2001?'#f0c040':'#fff'};">${ns.t2}</div></div>
      </div>
      <button class="btn btn-green btn-full" onclick="S.mancheSummary=null;renderGame();">Continuer ▶</button>
    </div>
  </div>`;
}

/* ═══════════════════════════════════════════
   WINNER
═══════════════════════════════════════════ */
function renderWinner(){
  const w=S.winner,wk=w.team===S.t1?'t1':'t2';
  document.getElementById('screen-winner').innerHTML=`
    <div class="winner-trophy" style="font-size:72px;">🏆</div>
    <div style="font-size:28px;font-weight:800;letter-spacing:-.5px;">${w.team.name}</div>
    <div style="font-size:16px;opacity:.8;">Vainqueur avec ${w.score[wk]} points !</div>
    <div style="display:flex;gap:16px;margin:8px 0;">
      <div style="background:rgba(255,255,255,.15);border-radius:12px;padding:12px 20px;">
        <div style="font-size:11px;opacity:.75;margin-bottom:4px;">${S.t1.name}</div>
        <div style="font-size:28px;font-weight:800;">${w.score.t1}</div>
      </div>
      <div style="background:rgba(255,255,255,.15);border-radius:12px;padding:12px 20px;">
        <div style="font-size:11px;opacity:.75;margin-bottom:4px;">${S.t2.name}</div>
        <div style="font-size:28px;font-weight:800;">${w.score.t2}</div>
      </div>
    </div>
    <button class="btn btn-outline" onclick="S.screen='game';S.tab='history';render();" style="margin-top:8px;">Voir l'historique</button>
    <button class="btn btn-green" onclick="newGameReset();" style="margin-top:4px;">Nouvelle partie</button>`;
}

/* ═══════════════════════════════════════════
   SWIPE NAVIGATION
═══════════════════════════════════════════ */
(function(){
  const TAB_ORDER=['enjeu','contrat','saisie','history','marque'];
  let tx=0,ty=0;
  document.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
  document.addEventListener('touchend',e=>{
    if(S.screen!=='game')return;
    const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
    if(Math.abs(dx)<60||Math.abs(dx)<Math.abs(dy)*1.5)return;
    const idx=TAB_ORDER.indexOf(S.tab);
    const ni=dx<0?Math.min(idx+1,TAB_ORDER.length-1):Math.max(idx-1,0);
    if(ni!==idx){S.tab=TAB_ORDER[ni];renderGame();}
  },{passive:true});
})();

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
render();

// Splash disparaît après 1.2s
setTimeout(()=>{
  const s=document.getElementById('splash');
  if(s){s.classList.add('hide');setTimeout(()=>s.remove(),500);}
},1200);
</script>
